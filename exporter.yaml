#Excel导入目录(excel所在目录)
DataImportPath: "./data/excel"

#数据导出目录
DataExportPath: "./data/json"

#导出格式: json、pb
ExportFormats:
  - "json"
  - "pb"

#proto所在目录
ProtoPath: "./proto"

#需要解析的proto文件
ProtoFiles:
  - "cfg.proto"

#可选项:导出md5文件完整路径(所有格式合并)
Md5ExportPath: "./data/json/md5.json"

#可选项:导出json文件的md5完整路径
JsonMd5ExportPath: "./data/json/json_md5.json"

#可选项:导出pb文件的md5完整路径
PbMd5ExportPath: "./data/json/pb_md5.json"

#代码模板目录
CodeTemplatePath: "./template/"

#代码模板
CodeTemplateFiles:
  - "data_mgr.go.template"
#代码导出目录 NOTE:和CodeTemplateFiles的数量要一致
CodeExportFiles:
  - "./cfg/data_mgr.go"

#导出分组标记 c s cs
ExportGroup: "s"

#默认的分组标记
DefaultGroup: "cs"

#导出总表的文件名
ExportAllExcelFile: "all.xlsx"

#导出总表的sheet名
ExportAllSheet: "ExportCfg"
